steps:
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'riffai-frontend'
      - '--source=.'
      - '--region=asia-southeast1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--timeout=300'
      - '--set-env-vars=NEXT_PUBLIC_API_URL=https://riffai-backend-715107904640.asia-southeast1.run.app'
      - '--set-build-env-vars=NEXT_PUBLIC_API_URL=https://riffai-backend-715107904640.asia-southeast1.run.app'
      - '--project=trim-descent-452802-t2'

timeout: 1200s
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
